<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Visor WMS REDIAM</title>

  <!-- OpenLayers -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol/ol.css">
  <script src="https://cdn.jsdelivr.net/npm/ol/ol.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
    }
    #map {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script>
    // Capa base (OpenStreetMap)
    const osm = new ol.layer.Tile({
      source: new ol.source.OSM()
    });

    // Capa WMS (REDIAM)
    const wmsLayer = new ol.layer.Tile({
      source: new ol.source.TileWMS({
        url: 'https://www.juntadeandalucia.es/medioambiente/mapwms/REDIAM_zonas_protegidas_demarcac_inter_and',
        params: {
          'LAYERS': '0', // luego se puede cambiar por el nombre real
          'TILED': true
        },
        serverType: 'geoserver',
        crossOrigin: 'anonymous'
      })
    });

    // Crear mapa
    const map = new ol.Map({
      target: 'map',
      layers: [osm, wmsLayer],
      view: new ol.View({
        center: ol.proj.fromLonLat([-4.5, 37.5]),
        zoom: 7
      })
    });
  </script>
</body>
</html>
